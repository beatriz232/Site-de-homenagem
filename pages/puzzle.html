<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle do Amor 🧩💖</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/styles.css" />

  <style>
    body { opacity: 0; transition: opacity .8s ease; }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
    }
    .title { font-size: 28px; font-weight: 700; }

    .btn-back {
      text-decoration: none;
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      transition: transform .2s ease, background .2s ease;
      white-space: nowrap;
    }
    .btn-back:hover { transform: translateY(-2px); background: rgba(255,255,255,0.24); }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(233, 30, 99, 0.25);
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
      margin-bottom: 18px;
    }

    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    .tile {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 34px;
      transition: transform .18s ease;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .tile:hover { transform: translateY(-2px); }

    .tile.revealed {
      background: rgba(0,0,0,0.25);
    }

    .tile.matched {
      background: rgba(46, 204, 113, 0.22);
      border-color: rgba(46, 204, 113, 0.55);
      cursor: default;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff4d6d, #e91e63);
      box-shadow: 0 12px 30px rgba(233,30,99,.35);
      transition: transform .2s ease;
    }
    .btn:hover { transform: translateY(-2px); }

    .btn.secondary {
      background: rgba(255,255,255,0.18);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.22);
      font-weight: 600;
    }

    .msg {
      margin-top: 14px;
      display: none;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
    }
  </style>
</head>

<body>
  <canvas id="heartsCanvas"></canvas>

  <main class="page">
    <div class="topbar">
      <div>
        <div class="title">Puzzle do Amor 🧩💖</div>
        <div style="opacity:.9">Encontre os pares e libere a mensagem final ✨</div>
      </div>
      <a class="btn-back" href="../amor.html">⬅ Voltar</a>
    </div>

    <section class="card">
      <div class="stats">
        <div class="pill">🎯 Pares: <span id="pairs">0</span> / <span id="pairsTotal">0</span></div>
        <div class="pill">🧠 Tentativas: <span id="moves">0</span></div>
      </div>

      <div class="grid" id="grid"></div>

      <div class="msg" id="finalMsg">
        <h3 style="margin-bottom:6px;">Você conseguiu 😭💖</h3>
        <p style="opacity:.95; line-height:1.8;">
          Assim como nesse jogo, eu sempre quero escolher você — de novo e de novo.
          Obrigada por existir e por ser meu amor. 💞
        </p>
      </div>

      <div class="actions">
        <button class="btn" id="resetBtn">Recomeçar 🔁</button>
        <button class="btn secondary" id="shuffleBtn">Embaralhar ✨</button>
      </div>
    </section>
  </main>

  <script>
    window.addEventListener("load", () => document.body.style.opacity = "1");

    const iconsBase = ["💖","💞","💘","💗","💕","🌙","✨","🌸"];
    let icons = [];
    let first = null;
    let lock = false;
    let moves = 0;
    let pairs = 0;

    const grid = document.getElementById("grid");
    const movesEl = document.getElementById("moves");
    const pairsEl = document.getElementById("pairs");
    const pairsTotalEl = document.getElementById("pairsTotal");
    const finalMsg = document.getElementById("finalMsg");

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function build() {
      // 8 pares = 16 tiles (grid 4x4)
      icons = shuffle([...iconsBase, ...iconsBase]);
      first = null;
      lock = false;
      moves = 0;
      pairs = 0;
      movesEl.textContent = "0";
      pairsEl.textContent = "0";
      pairsTotalEl.textContent = String(iconsBase.length);
      finalMsg.style.display = "none";

      grid.innerHTML = "";
      icons.forEach((icon, idx) => {
        const tile = document.createElement("button");
        tile.type = "button";
        tile.className = "tile";
        tile.dataset.icon = icon;
        tile.dataset.index = String(idx);
        tile.textContent = "❥"; // verso fofo
        tile.addEventListener("click", () => onPick(tile));
        grid.appendChild(tile);
      });
    }

    function reveal(tile, show) {
      tile.classList.toggle("revealed", show);
      tile.textContent = show ? tile.dataset.icon : "❥";
    }

    function onPick(tile) {
      if (lock) return;
      if (tile.classList.contains("matched")) return;
      if (tile === first) return;

      reveal(tile, true);

      if (!first) {
        first = tile;
        return;
      }

      moves++;
      movesEl.textContent = String(moves);

      const same = first.dataset.icon === tile.dataset.icon;
      if (same) {
        first.classList.add("matched");
        tile.classList.add("matched");
        pairs++;
        pairsEl.textContent = String(pairs);
        first = null;

        if (pairs === iconsBase.length) {
          finalMsg.style.display = "block";
          finalMsg.scrollIntoView({ behavior: "smooth", block: "start" });
        }
        return;
      }

      lock = true;
      setTimeout(() => {
        reveal(first, false);
        reveal(tile, false);
        first = null;
        lock = false;
      }, 650);
    }

    document.getElementById("resetBtn").addEventListener("click", build);
    document.getElementById("shuffleBtn").addEventListener("click", build);

    build();
  </script>

  <script src="../assets/js/hearts.js"></script>
</body>
</html>
