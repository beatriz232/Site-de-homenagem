<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Quiz do Nosso Amor 💖</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/styles.css" />

  <style>

    :root{
      --pink:#ff5c8a;
      --pink-soft:#ff85a2;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      color:white;
      overflow-x:hidden;

      background:
      radial-gradient(
        circle at top,
        rgba(255,92,138,.18),
        transparent 35%
      ),

      linear-gradient(
        180deg,
        #14050d,
        #09090f
      );

      min-height:100vh;
      opacity:0;
      transition:opacity 1s ease;
    }

    /* GLOW */
    .glow{
      position:fixed;
      width:450px;
      height:450px;
      border-radius:50%;
      filter:blur(120px);
      opacity:.14;
      pointer-events:none;
      z-index:0;
    }

    .glow1{
      background:#ff5c8a;
      top:-120px;
      right:-120px;
    }

    .glow2{
      background:#ff85a2;
      bottom:-120px;
      left:-120px;
    }

    /* HEARTS */
    #heartsCanvas{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    /* PAGE */
    .page{
      width:min(900px,92%);
      margin:auto;
      position:relative;
      z-index:2;
      padding:40px 0 100px;
    }

    /* TOPBAR */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:40px;
    }

    .title{
      font-size:clamp(2.5rem,5vw,4rem);
      font-weight:700;
      line-height:1.1;
      letter-spacing:-2px;
    }

    .subtitle{
      margin-top:12px;
      opacity:.82;
      line-height:1.8;
      max-width:600px;
    }

    /* BACK */
    .btn-back{
      text-decoration:none;
      color:white;

      padding:12px 18px;

      border-radius:999px;

      background:rgba(255,255,255,.08);

      border:1px solid rgba(255,255,255,.10);

      backdrop-filter:blur(15px);

      transition:.3s ease;
    }

    .btn-back:hover{
      transform:translateY(-4px);
      background:rgba(255,255,255,.15);
    }

    /* CARD */
    .card{

      background:rgba(255,255,255,.08);

      border:1px solid rgba(255,255,255,.10);

      backdrop-filter:blur(18px);

      border-radius:35px;

      padding:35px;

      box-shadow:
      0 18px 60px rgba(233,30,99,.18);

      position:relative;

      overflow:hidden;
    }

    .card::before{
      content:'';

      position:absolute;
      inset:0;

      background:
      linear-gradient(
        135deg,
        rgba(255,255,255,.05),
        transparent
      );

      pointer-events:none;
    }

    /* PROGRESS */
    .progress-text{
      margin-bottom:12px;
      opacity:.8;
      font-size:.95rem;
    }

    .progress{
      width:100%;
      height:10px;

      background:rgba(255,255,255,.08);

      border-radius:999px;

      overflow:hidden;

      margin-bottom:30px;
    }

    .progress-bar{
      height:100%;
      width:0%;

      border-radius:999px;

      background:
      linear-gradient(
        90deg,
        #ff5c8a,
        #ff85a2
      );

      transition:.4s ease;
    }

    /* QUESTION */
    .question-box{
      animation:fade .5s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .question{
      font-size:1.5rem;
      line-height:1.5;
      margin-bottom:25px;
    }

    /* OPTIONS */
    .options{
      display:grid;
      gap:14px;
    }

    .option{

      border:none;
      cursor:pointer;

      width:100%;

      padding:16px 18px;

      border-radius:18px;

      text-align:left;

      color:white;

      font-weight:600;

      background:rgba(255,255,255,.08);

      border:1px solid rgba(255,255,255,.08);

      transition:.3s ease;
    }

    .option:hover{

      transform:
      translateY(-3px);

      background:rgba(255,255,255,.15);
    }

    .correct{
      background:rgba(46,204,113,.22) !important;
      border:1px solid rgba(46,204,113,.5);
    }

    .wrong{
      background:rgba(231,76,60,.22) !important;
      border:1px solid rgba(231,76,60,.5);
    }

    /* RESULT */
    .result{
      display:none;
      text-align:center;
      animation:fade .6s ease;
    }

    .result h2{
      font-size:2rem;
      margin-bottom:15px;
    }

    .result p{
      line-height:2;
      opacity:.92;
    }

    /* BUTTON */
    .btn{

      margin-top:25px;

      border:none;
      cursor:pointer;

      padding:14px 24px;

      border-radius:999px;

      font-weight:700;
      color:white;

      background:
      linear-gradient(
        135deg,
        #ff5c8a,
        #e91e63
      );

      box-shadow:
      0 12px 30px rgba(233,30,99,.30);

      transition:.3s ease;
    }

    .btn:hover{
      transform:
      translateY(-4px)
      scale(1.03);
    }

    /* MOBILE */
    @media(max-width:768px){

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .card{
        padding:25px;
      }

      .question{
        font-size:1.25rem;
      }

      .title{
        font-size:2.5rem;
      }

    }

  </style>
</head>

<body>

  <!-- GLOW -->
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <!-- HEARTS -->
  <canvas id="heartsCanvas"></canvas>

  <main class="page">

    <!-- TOPBAR -->
    <div class="topbar">

      <div>

        <div class="title">
          Quiz do Nosso Amor 💖
        </div>

        <div class="subtitle">
          Será que você conhece mesmo
          a nossa história? ✨
        </div>

      </div>

      <a href="../index.html" class="btn-back">
        ⬅ Voltar
      </a>

    </div>

    <!-- CARD -->
    <section class="card">

      <!-- PROGRESS -->
      <div class="progress-text" id="progressText">
        Pergunta 1 de 18
      </div>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- QUIZ -->
      <div id="quizContainer"></div>

      <!-- RESULT -->
      <div class="result" id="resultBox">

        <h2 id="resultTitle"></h2>

        <p id="resultText"></p>

        <button class="btn" onclick="restartQuiz()">
          Jogar novamente 💞
        </button>

      </div>

    </section>

  </main>

  <script>

    window.addEventListener(
      "load",
      () => {
        document.body.style.opacity = "1";
      }
    );

    const questions = [

      {
        q: "💘 Qual foi a data que mudou tudo?",
        options: [
          "07/04/2025",
          "14/02/2025",
          "01/01/2025",
          "12/12/2024"
        ],
        answer: "07/04/2025"
      },

      {
        q: "✨ O que mais combina em nós duas?",
        options: [
          "Nosso jeito de rir das mesmas coisas",
          "Nosso carinho uma com a outra",
          "Nossa parceria em tudo",
          "Nosso amor que só cresce"
        ],
        answer: "Nossa parceria em tudo"
      },

      {
        q: "💖 Qual é o nosso momento favorito juntas?",
        options: [
          "Conversando sobre tudo e nada",
          "Assistindo filme agarradinha",
          "Fazendo planos pro futuro",
          "Passear juntas"
        ],
        answer: "Assistindo filme agarradinha"
      },

      {
        q: "🌙 Quando a saudade aperta, eu penso em…",
        options: [
          "Você",
          "Qualquer coisa",
          "Nada",
          "Tudo"
        ],
        answer: "Você"
      },

      {
        q: "💗 O que eu mais amo em você?",
        options: [
          "Seu jeito",
          "Seu carinho",
          "Seu olhar",
          "Tudo em você"
        ],
        answer: "Tudo em você"
      },

      {
        q: "💞 O que faz nosso relacionamento ser tão especial?",
        options: [
          "Nosso amor e cuidado",
          "Nossa história e memórias",
          "A forma como escolhemos estar juntas",
          "Tudo isso junto"
        ],
        answer: "Tudo isso junto"
      },

      {
        q: "🌟 O que eu mais quero pro nosso futuro?",
        options: [
          "Continuar construindo nossa história",
          "Viver cada momento juntas",
          "Te fazer feliz todos os dias",
          "Tudo isso junto"
        ],
        answer: "Viver cada momento juntas"
      },

      {
        q: "❤️ O que mudou minha vida completamente?",
        options: [
          "Te conhecer",
          "Viajar",
          "Trabalhar",
          "Estudar"
        ],
        answer: "Te conhecer"
      },

      {
        q: "🏨 Qual momento ficou marcado pra mim?",
        options: [
          "Nossa primeira noite juntas",
          "Primeira ligação",
          "Primeira mensagem",
          "Primeira foto"
        ],
        answer: "Nossa primeira noite juntas"
      },

      {
        q: "💬 O que nunca falta nas nossas conversas?",
        options: [
          "Risadas",
          "Silêncio",
          "Conexão",
          "Tédio"
        ],
        answer: "Conexão"
      },

      {
        q: "✨ O que eu quero viver pra sempre?",
        options: [
          "Nossa história",
          "Viagens",
          "Dinheiro",
          "Festas"
        ],
        answer: "Nossa história"
      },

      {
        q: "🏖️ Onde aconteceu um dos nossos dates mais especiais?",
        options: [
          "Na praia",
          "No shopping",
          "No cinema",
          "No parque"
        ],
        answer: "Na praia"
      },

      {
        q: "🚍 Qual lugar virou parte da nossa história?",
        options: [
          "O terminal",
          "A escola",
          "O trabalho",
          "A academia"
        ],
        answer: "O terminal"
      },

      {
        q: "💌 Qual foi uma das coisas mais especiais que já ouvi de você?",
        options: [
          "O primeiro eu te amo",
          "Bom dia",
          "Boa noite",
          "Tudo bem?"
        ],
        answer: "O primeiro eu te amo"
      },

      {
        q: "💑 Como eu me sinto quando estou com você?",
        options: [
          "Em casa",
          "Ansiosa",
          "Perdida",
          "Confusa"
        ],
        answer: "Em casa"
      },

      {
        q: "🌹 O que eu quero continuar criando com você?",
        options: [
          "Memórias inesquecíveis",
          "Discussões",
          "Distância",
          "Silêncio"
        ],
        answer: "Memórias inesquecíveis"
      },

      {
        q: "💫 O que nunca mudou desde que te conheci?",
        options: [
          "Meu amor por você",
          "Meu gosto musical",
          "Minha rotina",
          "Meu sono"
        ],
        answer: "Meu amor por você"
      },

      {
        q: "💞 O que eu escolheria em todas as vidas?",
        options: [
          "Você",
          "Dinheiro",
          "Viagens",
          "Fama"
        ],
        answer: "Você"
      }

    ];

    let currentQuestion = 0;
    let score = 0;

    const quizContainer =
      document.getElementById("quizContainer");

    const progressText =
      document.getElementById("progressText");

    const progressBar =
      document.getElementById("progressBar");

    const resultBox =
      document.getElementById("resultBox");

    const resultTitle =
      document.getElementById("resultTitle");

    const resultText =
      document.getElementById("resultText");

    function renderQuestion(){

      const q = questions[currentQuestion];

      progressText.textContent =
        `Pergunta ${currentQuestion + 1} de ${questions.length}`;

      progressBar.style.width =
        `${((currentQuestion) / questions.length) * 100}%`;

      quizContainer.innerHTML = `

        <div class="question-box">

          <div class="question">
            ${q.q}
          </div>

          <div class="options">

            ${q.options.map(option => `

              <button
                class="option"
                onclick="selectAnswer(this,'${option.replace(/'/g, "\\'")}')"
              >
                ${option}
              </button>

            `).join('')}

          </div>

        </div>

      `;
    }

    function selectAnswer(button,answer){

      const q = questions[currentQuestion];

      const buttons =
        document.querySelectorAll(".option");

      buttons.forEach(btn => {

        btn.disabled = true;

        if(btn.textContent.trim() === q.answer){
          btn.classList.add("correct");
        }

        if(
          btn.textContent.trim() === answer &&
          answer !== q.answer
        ){
          btn.classList.add("wrong");
        }

      });

      if(answer === q.answer){
        score++;
      }

      setTimeout(() => {

        currentQuestion++;

        if(currentQuestion < questions.length){

          renderQuestion();

        } else {

          showResult();

        }

      },1000);
    }

    function showResult(){

      progressBar.style.width = "100%";

      quizContainer.style.display = "none";

      resultBox.style.display = "block";

      const total = questions.length;

      const pct =
        Math.round((score / total) * 100);

      if(pct === 100){

        resultTitle.textContent =
          "Perfeito 💎";

        resultText.innerHTML = `
          Você acertou tudo! ❤️
          <br><br>
          Isso só prova que nossa história
          tá guardada no seu coração
          igual está no meu.
          <br><br>
          E sinceramente?
          A melhor parte da minha vida
          sempre vai ser você. ✨
        `;

      } else if(pct >= 70){

        resultTitle.textContent =
          "Você conhece muito a nossa história 💞";

        resultText.innerHTML = `
          Você acertou ${score} de ${total}.
          <br><br>
          E cada resposta me fez lembrar
          o quanto eu amo viver tudo isso com você. ❤️
        `;

      } else {

        resultTitle.textContent =
          "Precisamos criar mais memórias 😭💖";

        resultText.innerHTML = `
          Você acertou ${score} de ${total}.
          <br><br>
          Acho que vamos precisar
          de mais dates, mais abraços
          e mais momentos juntinhas. ✨
        `;
      }

    }

    function restartQuiz(){

      currentQuestion = 0;
      score = 0;

      quizContainer.style.display = "block";

      resultBox.style.display = "none";

      renderQuestion();
    }

    renderQuestion();

  </script>

  <!-- HEARTS -->
  <script src="../assets/js/hearts.js"></script>

</body>

</html>
