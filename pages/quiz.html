<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz do Nosso Amor 💖</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/styles.css" />

  <style>
    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 25px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 10px 35px rgba(0,0,0,.2);
    }

    .btn-back {
      text-decoration: none;
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      transition: transform .2s ease, background .2s ease;
      white-space: nowrap;
    }
    .btn-back:hover { transform: translateY(-2px); background: rgba(255,255,255,0.24); }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(233, 30, 99, 0.25);
    }

    .subtitle { opacity: .9; margin-top: 6px; }

    .q {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .q h3 {
      font-size: 18px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .opt {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .opt button {
      width: 100%;
      border: none;
      cursor: pointer;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.18);
      color: white;
      font-weight: 600;
      transition: transform .2s ease, background .2s ease;
      text-align: left;
    }
    .opt button:hover { transform: translateY(-2px); background: rgba(255,255,255,0.25); }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 600;
      margin-top: 18px;
    }

    .result {
      margin-top: 20px;
      display: none;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff4d6d, #e91e63);
      box-shadow: 0 12px 30px rgba(233,30,99,.35);
      transition: transform .2s ease;
    }
    .btn:hover { transform: translateY(-2px); }

    .btn.secondary {
      background: rgba(255,255,255,0.18);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.22);
      font-weight: 600;
    }

    /* fade */
    body { opacity: 0; transition: opacity .8s ease; }
  </style>
</head>

<body>
  <canvas id="heartsCanvas"></canvas>

  <main class="page">
    <div class="topbar">
      <div>
        <div class="title">Quiz do Nosso Amor 💖</div>
        <div class="subtitle">Responde e vê o quanto você conhece a nossa história ✨</div>
      </div>
      <a href="../index.html" class="btn-back">⬅ Voltar</a>
    </div>

    <section class="card">
      <div class="badge">📌 Pontos: <span id="score">0</span> / <span id="total">0</span></div>

      <div id="quiz"></div>

      <div class="result" id="resultBox">
        <h3 id="resultTitle" style="margin-bottom: 6px;">Resultado</h3>
        <p id="resultText" style="opacity:.95;"></p>
      </div>

      <div class="actions">
        <button class="btn" id="finishBtn">Finalizar 💞</button>
        <button class="btn secondary" id="resetBtn">Recomeçar 🔁</button>
      </div>
    </section>
  </main>

  <script>
    // fade in
    window.addEventListener("load", () => document.body.style.opacity = "1");

    const questions = [
      {
        q: "Qual foi a data que mudou tudo? 💘",
        options: ["07/04/2025", "14/02/2025", "01/01/2025", "12/12/2024"],
        answer: "07/04/2025"
      },
      {
        q: "O que mais combina em nós duas?✨",
        options: ["Nosso jeito de rir das mesmas coisas", "Nosso carinho uma com a outra", "Nossa parceria em tudo", "Nosso amor que só cresce"],
        answer: "Nossa parceria em tudo"
      },
      {
        q: "Qual é o nosso momento favorito juntas?💖",
        options: ["Conversando sobre tudo e nada", "Assistindo algo agarradinhos, de denguinho", "Fazendo planos pro futuro", "Passear"],
        answer: "Assistindo algo agarradinhos, de denguinho"  
      },
      {
        q: "Quando a saudade aperta, eu penso em…",
        options: ["Você", "Qualquer coisa", "Nada", "Tudo"],
        answer: "Você"
      },
      {
        q: "O que eu mais amo em você? 💗",
        options: ["Seu jeito de ser", "Sua força e cuidado", "Tudo em você", "A forma como me faz sentir"],
        answer: "Tudo em você"
      },
      {
        q: "O que faz nosso relacionamento ser especial? 💞",
        options: ["Nosso amor e cuidado", "Nossa história e memórias", "A forma como escolhemos estar juntas", "Tudo isso junto"],
        answer: "A forma como escolhemos estar juntas"
      },
      {
        q: "O que eu mais quero pro nosso futuro? 🌙",
        options: ["Continuar construindo nossa história com carinho", "Viver cada momento juntas, do jeitinho da gente", "Te fazer feliz todos os dias", "tudo isso junto"],
        answer: "Viver cada momento juntas, do jeitinho da gente"
      },
      {
        q:"O que eu mais amo em nós? 💖",
        options: ["Nossa conexão emocional", "Nosso jeito de ser juntas", "A forma como nos entendemos", "Tudo em nós"],
        answer: "A forma como nos entendemos"
      },

    ];

    const quizEl = document.getElementById("quiz");
    const scoreEl = document.getElementById("score");
    const totalEl = document.getElementById("total");
    const resultBox = document.getElementById("resultBox");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");

    totalEl.textContent = String(questions.length);

    let score = 0;
    let answered = new Set();

    function renderQuiz() {
      quizEl.innerHTML = "";
      questions.forEach((item, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "q";
        wrap.innerHTML = `
          <h3>${idx + 1}. ${item.q}</h3>
          <div class="opt" id="opt-${idx}"></div>
        `;

        const optBox = wrap.querySelector(`#opt-${idx}`);
        item.options.forEach(opt => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = opt;

          btn.addEventListener("click", () => {
            if (answered.has(idx)) return;

            answered.add(idx);
            const correct = opt === item.answer;
            if (correct) score++;

            scoreEl.textContent = String(score);

            // travar e mostrar feedback
            [...optBox.querySelectorAll("button")].forEach(b => {
              b.disabled = true;
              b.style.opacity = "0.75";
              if (b.textContent === item.answer) {
                b.style.background = "rgba(46, 204, 113, 0.25)";
                b.style.border = "1px solid rgba(46, 204, 113, 0.6)";
              }
              if (b.textContent === opt && !correct) {
                b.style.background = "rgba(231, 76, 60, 0.25)";
                b.style.border = "1px solid rgba(231, 76, 60, 0.6)";
              }
            });
          });

          optBox.appendChild(btn);
        });

        quizEl.appendChild(wrap);
      });
    }

    function finish() {
      resultBox.style.display = "block";
      const total = questions.length;
      const pct = Math.round((score / total) * 100);

      if (pct === 100) {
        resultTitle.textContent = "Perfeito 💎";
        resultText.textContent = `Você acertou tudo! ${score}/${total}. Isso é amor com memória boa 😭💖`;
      } else if (pct >= 70) {
        resultTitle.textContent = "Lindo demais 💞";
        resultText.textContent = `Você fez ${score}/${total}. A gente se conhece muito! ✨`;
      } else if (pct >= 40) {
        resultTitle.textContent = "A gente melhora juntinhas 😌💗";
        resultText.textContent = `Você fez ${score}/${total}. Vale mais um encontro + mais memórias 💘`;
      } else {
        resultTitle.textContent = "Calma, meu amor 😅💗";
        resultText.textContent = `Você fez ${score}/${total}. Nada que um carinho e tempo juntas não resolva 💖`;
      }
      resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function reset() {
      score = 0;
      answered = new Set();
      scoreEl.textContent = "0";
      resultBox.style.display = "none";
      renderQuiz();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("finishBtn").addEventListener("click", finish);
    document.getElementById("resetBtn").addEventListener("click", reset);

    renderQuiz();
  </script>

  <!-- Se você quiser corações nesta página, mantenha o hearts.js -->
  <script src="../assets/js/hearts.js"></script>
</body>
</html>
