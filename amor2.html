<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nosso Cantinho Secreto 💕</title>

<style>
body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#ff4d6d,#e91e63);
  font-family:Arial, sans-serif;
  color:white;
}

.login-box{
  background:rgba(255,255,255,0.15);
  padding:40px;
  border-radius:20px;
  text-align:center;
  backdrop-filter:blur(10px);
}

input{
  padding:12px;
  border:none;
  border-radius:20px;
  margin-top:15px;
  text-align:center;
}

button{
  margin-top:20px;
  padding:10px 25px;
  border:none;
  border-radius:20px;
  background:white;
  color:#e91e63;
  cursor:pointer;
  font-weight:bold;
}

.erro{
  margin-top:10px;
  display:none;
  color:#ffe6e6;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Digite a data que mudou nossas vidas 💖</h2>
  <input type="password" id="senha" placeholder="••••">
  <br>
  <button onclick="verificar()">Entrar</button>
  <div class="erro" id="erro">Senha incorreta 💔</div>
</div>

<script>
function verificar(){
  const senha = document.getElementById("senha").value;
  const erro = document.getElementById("erro");

  if(senha === "0704"){
    window.location.href = "amor2.html";
  } else {
    erro.style.display = "block";
  }
}
</script>

</body>
</html>
