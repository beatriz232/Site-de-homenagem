<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Para Minha Namorada ❤️</title>

<style>
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background:#000;
  color:white;
  text-align:center;
  padding:50px 20px;
}

h1 { font-size:3rem; }

.unidades {
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.unidade {
  background:rgba(0,0,0,0.7);
  padding:15px 20px;
  border-radius:10px;
  min-width:80px;
}

.unidade span {
  font-size:2rem;
  font-weight:bold;
  display:block;
}

.slideshow-container {
  width:320px;
  height:450px;
  margin:40px auto;
  overflow:hidden;
  border-radius:25px;
}

.slide { display:none; width:100%; height:100%; }
.slide img { width:100%; height:100%; object-fit:cover; }

button {
  margin-top:30px;
  padding:12px 24px;
  background:white;
  color:#e91e63;
  border:none;
  border-radius:25px;
  cursor:pointer;
}

#surpresa { display:none; margin-top:30px; }

.menu {
  margin-top:60px;
  display:flex;
  flex-direction:column;
  gap:15px;
  max-width:300px;
  margin-left:auto;
  margin-right:auto;
}

.menu a {
  padding:12px;
  background:#e91e63;
  color:white;
  border-radius:25px;
  text-decoration:none;
}
</style>
</head>

<body>

<h1>Para Minha Namorada ❤️</h1>

<h2>Eu te amo há:</h2>

<div class="unidades">
  <div class="unidade"><span id="anos">0</span><label>Anos</label></div>
  <div class="unidade"><span id="meses">0</span><label>Meses</label></div>
  <div class="unidade"><span id="dias">0</span><label>Dias</label></div>
  <div class="unidade"><span id="horas">0</span><label>Horas</label></div>
  <div class="unidade"><span id="minutos">0</span><label>Minutos</label></div>
  <div class="unidade"><span id="segundos">0</span><label>Segundos</label></div>
</div>

<audio id="musica" loop>
  <source src="assets/audio/Djavan-Um=Amor-Puro-(Áudio-Oficial).mp3" type="audio/mpeg">
</audio>

<div class="slideshow-container">
  <div class="slide"><img src="assets/images/foto.jpg"></div>
  <div class="slide"><img src="assets/images/foto2.jpg"></div>
  <div class="slide"><img src="assets/images/foto3.jpg"></div>
</div>

<button onclick="mostrarSurpresa()">Clique aqui ❤️</button>

<div id="surpresa">
  Eu te amo mil milhões ❤️💖
</div>

<div class="menu">
  <a href="pages/mapa.html">🗺️ Nosso Primeiro Encontro</a>
  <a href="pages/timeline.html">📖 Linha do Tempo</a>
  <a href="pages/quiz.html">💞 Quiz do Amor</a>
  <a href="pages/memoria.html">📸 Memórias</a>
</div>

<script>
function atualizarContador() {
  const inicio = new Date(2025,3,7);
  const agora = new Date();

  let anos = agora.getFullYear() - inicio.getFullYear();
  let meses = agora.getMonth() - inicio.getMonth();
  let dias = agora.getDate() - inicio.getDate();

  if (dias < 0) {
    meses--;
    const ultimoMes = new Date(agora.getFullYear(), agora.getMonth(), 0);
    dias += ultimoMes.getDate();
  }

  if (meses < 0) {
    anos--;
    meses += 12;
  }

  const diff = agora - inicio;
  const horas = Math.floor(diff / (1000*60*60)) % 24;
  const minutos = Math.floor(diff / (1000*60)) % 60;
  const segundos = Math.floor(diff / 1000) % 60;

  document.getElementById("anos").innerText = anos;
  document.getElementById("meses").innerText = meses;
  document.getElementById("dias").innerText = dias;
  document.getElementById("horas").innerText = horas;
  document.getElementById("minutos").innerText = minutos;
  document.getElementById("segundos").innerText = segundos;
}

function mostrarSurpresa() {
  document.getElementById("surpresa").style.display="block";
  document.getElementById("musica").play();
}

setInterval(atualizarContador,1000);
atualizarContador();

let slideIndex=0;
function showSlides(){
  const slides=document.getElementsByClassName("slide");
  for(let i=0;i<slides.length;i++){slides[i].style.display="none";}
  slideIndex++;
  if(slideIndex>slides.length) slideIndex=1;
  slides[slideIndex-1].style.display="block";
  setTimeout(showSlides,3000);
}
showSlides();
</script>

</body>
</html>
