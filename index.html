<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Cantinho 💖</title>

  <!-- Fonte elegante -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(-45deg, #fff0f6, #f8bbd0, #e91e63, #ff4d6d);
      background-size: 300% 300%;
      animation: gradientMove 12s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Modal */
    .modal {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      padding: 45px;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(233, 30, 99, 0.4);
      text-align: center;
      width: 340px;
      color: white;
      animation: fadeIn 1.2s ease forwards;
      z-index: 10;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal h2 {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .modal p {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .modal input {
      width: 100%;
      padding: 14px;
      border-radius: 20px;
      border: none;
      margin-top: 10px;
      font-weight: 600;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
    }

    .modal button {
      margin-top: 20px;
      padding: 12px 35px;
      font-size: 1rem;
      background: linear-gradient(135deg, #ff4d6d, #e91e63);
      border: none;
      border-radius: 30px;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.4s ease;
      box-shadow: 0 10px 25px rgba(233, 30, 99, 0.5);
    }

    .modal button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(233, 30, 99, 0.7);
    }

    .error {
      margin-top: 10px;
      font-size: 13px;
      color: #ffe6e6;
      display: none;
    }

    /* Corações flutuando */
    .heart {
      position: absolute;
      font-size: 20px;
      animation: floatUp linear infinite;
      opacity: 0.3;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh);
      }
      to {
        transform: translateY(-10vh);
      }
    }
  </style>
</head>

<body>

  <div class="modal">
    <h2>Nosso Cantinho Secreto 💕</h2>
    <p>Digite a data que mudou nossas vidas</p>

    <input type="password" id="senhaInput" placeholder="••••">
    <button onclick="verificarSenha()">Entrar</button>
    <div class="error" id="erroMsg">Senha incorreta 💔</div>
  </div>

  <script>
    const senhaCorreta = atob("MDcwNA=="); // 0704

    function verificarSenha() {
      const senhaDigitada = document.getElementById("senhaInput").value;
      const erro = document.getElementById("erroMsg");

      if (senhaDigitada === senhaCorreta) {
        window.location.href = "amor.html";
      } else {
        erro.style.display = "block";
        document.getElementById("senhaInput").value = "";
      }
    }

    // Permitir Enter
    document.getElementById("senhaInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        verificarSenha();
      }
    });

    // Criar corações animados
    function criarCoracao() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 10000);
    }

    setInterval(criarCoracao, 800);
  </script>

</body>
</html>
