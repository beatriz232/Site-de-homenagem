<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Para Minha Namorada ❤️</title>

<style>
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background: #000;
  color: white;
  text-align: center;
  padding: 50px 20px;
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
  text-shadow: 0 0 10px #fff;
}

.tempo-amor { margin: 30px auto; }

.unidades {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.unidade {
  background: rgba(0,0,0,0.7);
  padding: 15px 20px;
  border-radius: 10px;
  min-width: 80px;
}

.unidade span {
  display: block;
  font-size: 2rem;
  font-weight: bold;
}

.unidade label {
  font-size: 0.9rem;
  text-transform: uppercase;
  margin-top: 5px;
  display: block;
}

p {
  font-size: 1.3rem;
  max-width: 600px;
  margin: 20px auto;
  line-height: 1.6;
}

button {
  margin-top: 30px;
  padding: 12px 24px;
  font-size: 1rem;
  background: #fff;
  color: #e91e63;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

button:hover { background: #ffe6ec; }

#surpresa {
  display: none;
  margin-top: 30px;
  font-size: 1.2rem;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.slideshow-container {
  width: 320px;
  height: 450px;
  margin: 40px auto;
  overflow: hidden;
  border-radius: 25px;
}

.slide {
  display: none;
  width: 100%;
  height: 100%;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.heart {
  position: fixed;
  top: -30px;
  width: 20px;
  height: 20px;
  background: #e91e63;
  transform: rotate(45deg);
  animation: fall linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: #e91e63;
  border-radius: 50%;
}

.heart::before { top: -10px; left: 0; }
.heart::after { left: -10px; top: 0; }

@keyframes fall {
  to { transform: translateY(100vh) rotate(45deg); }
}
</style>
</head>

<body>

<h1>Para Minha Namorada ❤️</h1>

<div class="tempo-amor">
  <h2>Eu te amo há:</h2>
  <div class="unidades">

    <div class="unidade">
      <span id="anos">0</span>
      <label>Anos</label>
    </div>

    <div class="unidade">
      <span id="meses">0</span>
      <label>Meses</label>
    </div>

    <div class="unidade">
      <span id="dias">0</span>
      <label>Dias</label>
    </div>

    <div class="unidade">
      <span id="horas">0</span>
      <label>Horas</label>
    </div>

    <div class="unidade">
      <span id="minutos">0</span>
      <label>Minutos</label>
    </div>

    <div class="unidade">
      <span id="segundos">0</span>
      <label>Segundos</label>
    </div>

  </div>
</div>

<h2>Nossa história ainda está começando, mas cada dia é especial 💖</h2>

<audio id="musica" loop>
  <source src="assets/audio/Djavan-Um=Amor-Puro-(Áudio-Oficial).mp3" type="audio/mpeg">
</audio>

<div class="slideshow-container">
  <div class="slide"><img src="assets/images/foto.jpg"></div>
  <div class="slide"><img src="assets/images/foto2.jpg"></div>
  <div class="slide"><img src="assets/images/foto3.jpg"></div>
  <div class="slide"><img src="assets/images/foto_4.jpg.jpeg"></div>
  <div class="slide"><img src="assets/images/foto_8.jpg.jpeg"></div>
  <div class="slide"><img src="assets/images/foto_12.jpg.jpeg"></div>
</div>

<button onclick="mostrarSurpresa()">Clique aqui ❤️</button>

<div id="surpresa">
  Eu te amo mil milhões ❤️💖
</div>

<script>

function atualizarContador() {
  const inicio = new Date(2025, 3, 7, 0, 0, 0);
  const agora = new Date();

  if (agora < inicio) return;

  let anos = agora.getFullYear() - inicio.getFullYear();
  let meses = agora.getMonth() - inicio.getMonth();
  let dias = agora.getDate() - inicio.getDate();

  if (dias < 0) {
    meses--;
    const ultimoMes = new Date(agora.getFullYear(), agora.getMonth(), 0);
    dias += ultimoMes.getDate();
  }

  if (meses < 0) {
    anos--;
    meses += 12;
  }

  const diffMs = agora - inicio;
  const horas = Math.floor(diffMs / (1000 * 60 * 60)) % 24;
  const minutos = Math.floor(diffMs / (1000 * 60)) % 60;
  const segundos = Math.floor(diffMs / 1000) % 60;

  document.getElementById("anos").innerText = anos;
  document.getElementById("meses").innerText = meses;
  document.getElementById("dias").innerText = dias;
  document.getElementById("horas").innerText = horas;
  document.getElementById("minutos").innerText = minutos;
  document.getElementById("segundos").innerText = segundos;
}

function mostrarSurpresa() {
  document.getElementById("surpresa").style.display = "block";
  const audio = document.getElementById("musica");
  audio.play();
}

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = Math.random() * 3 + 2 + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);
setInterval(atualizarContador, 1000);
atualizarContador();

let slideIndex = 0;

function showSlides() {
  const slides = document.getElementsByClassName("slide");
  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  slideIndex++;
  if (slideIndex > slides.length) slideIndex = 1;
  slides[slideIndex - 1].style.display = "block";
  setTimeout(showSlides, 3000);
}

showSlides();

</script>

</body>
</html>
